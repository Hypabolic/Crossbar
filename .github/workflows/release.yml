name: Release

# Release flow (mirrors the Hypa repo's tag-input dispatch):
#   1. Bump the version in package.json via a normal PR (e.g. `npm version minor
#      --no-git-tag-version`), and merge it to main.
#   2. Publish either way:
#        - Manual:  Actions → Release → "Run workflow" → enter the tag (vX.Y.Z).
#        - Tag push: `git tag vX.Y.Z && git push origin vX.Y.Z`.
#      The tag must match package.json. This workflow never bumps the version; it
#      creates the tag + GitHub Release server-side and publishes to npm.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, e.g. v0.2.0 (must match package.json)"
        required: true
        type: string

permissions:
  contents: write # create the tag + GitHub Release, push the CHANGELOG commit
  id-token: write # npm provenance (OIDC)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: publish @hypabolic/crossbar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      # Resolve the release tag from the dispatch input or the pushed tag, validate
      # its shape, and assert it matches package.json. The version is owned by
      # package.json (bump it via a release PR) — this workflow never bumps it.
      - name: Resolve and verify tag
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Release tag must look like vX.Y.Z. Got '$TAG'."
            exit 1
          fi
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG#v}"
          echo "package.json=$PKG_VERSION  tag=$TAG"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION. Bump package.json via a release PR first."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      # No NODE_AUTH_TOKEN: authentication is via GitHub→npm OIDC trusted publishing.
      # Provenance is generated automatically.
      - name: Publish to npm (public, OIDC trusted publishing)
        run: npm publish --access public

      # Release notes for THIS version, from Conventional Commits. `--tag` lets
      # git-cliff label the as-yet-uncreated version so notes are correct before
      # the tag exists.
      - name: Generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --tag ${{ steps.ver.outputs.tag }} --output RELEASE_NOTES.md

      # Create (or update) the GitHub Release. Using GITHUB_TOKEN, the tag it
      # creates does NOT recursively trigger this workflow's tag-push event.
      # For the tag-push path the tag already exists; for dispatch it is created
      # at the checked-out commit via --target.
      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" --title "$TAG" --notes-file RELEASE_NOTES.md --target "$GITHUB_SHA"
          fi

      # Regenerate the full CHANGELOG.md from history and commit it back to main.
      - name: Update CHANGELOG.md (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag ${{ steps.ver.outputs.tag }} --output CHANGELOG.md

      - name: Commit CHANGELOG.md
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "CHANGELOG.md unchanged."
          else
            git commit -m "docs(changelog): ${TAG} [skip ci]"
            git push origin HEAD:main || echo "::warning::Could not fast-forward main with CHANGELOG update; will reconcile on next release."
          fi
