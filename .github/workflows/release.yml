name: Release

# Two ways to cut a release — both run tests, then publish to npm with provenance:
#   1. Manual: Actions → Release → "Run workflow" → pick patch/minor/major.
#      This bumps package.json, commits, tags vX.Y.Z, pushes, and publishes.
#   2. Tag push: `npm version patch && git push --follow-tags` locally, which
#      triggers this workflow on the new tag and publishes the existing version.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump"
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write # push the version commit + tag (manual path)
  id-token: write # npm provenance (OIDC)

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: publish @hypabolic/crossbar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Trusted publishing (OIDC) requires npm >= 11.5.1.
      - name: Ensure npm supports OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install (clean, from lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      # --- Manual path: bump version, commit, tag, push ---
      - name: Bump version and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}" -m "chore(release): v%s"
          git push --follow-tags

      # --- Tag-push path: ensure the tag matches package.json ---
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json=$PKG_VERSION  tag=$TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: authentication is via GitHub→npm OIDC trusted publishing.
      # Configure the trusted publisher for @hypabolic/crossbar on npmjs.com (repo
      # Hypabolic/Crossbar, workflow release.yml). Provenance is generated automatically.
      - name: Publish to npm (public, OIDC trusted publishing)
        run: npm publish --access public

      # Resolve the tag for the GitHub Release: the pushed tag (tag path) or the
      # tag the bump step just created (manual path).
      - name: Resolve release tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
          fi

      # Release notes for THIS version, from Conventional Commits.
      - name: Generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header --output RELEASE_NOTES.md

      - name: Create GitHub Release
        run: |
          gh release create "$RELEASE_TAG" \
            --title "$RELEASE_TAG" \
            --notes-file RELEASE_NOTES.md \
            --verify-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Regenerate the full CHANGELOG.md from history and commit it back to main.
      - name: Update CHANGELOG.md (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --output CHANGELOG.md

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --staged --quiet; then
            echo "CHANGELOG.md unchanged."
          else
            git commit -m "docs(changelog): ${RELEASE_TAG} [skip ci]"
            git push origin HEAD:main || echo "::warning::Could not fast-forward main with CHANGELOG update; will reconcile on next release."
          fi
